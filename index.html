<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinançasSimples</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">💰 FinançasSimples</div>
        <nav>
            <button onclick="mudarPagina('dashboard')">Dashboard</button>
            <button onclick="mudarPagina('gastos')">Lançar Gastos</button>
            <button onclick="mudarPagina('resumo')">Resumo & Dicas</button>
        </nav>
    </header>

    <main class="container">
        
        <section id="pag-dashboard" class="pagina ativa">
            <h2>Seu Orçamento</h2>
            <div class="card">
                <label for="salario">Defina seu Salário/Renda Mensal (R$):</label>
                <input type="number" id="salario-input" placeholder="Ex: 3000">
                <button onclick="salvarSalario()">Salvar Salário</button>
            </div>
            
            <div class="resumo-rapido">
                <div class="box">Renda: <span id="dash-renda">R$ 0,00</span></div>
                <div class="box despesa">Gastos: <span id="dash-gastos">R$ 0,00</span></div>
                <div class="box saldo">Saldo Atual: <span id="dash-saldo">R$ 0,00</span></div>
            </div>
        </section>

        <section id="pag-gastos" class="pagina">
            <h2>Registrar Novo Gasto</h2>
            <div class="card">
                <div class="form-group">
                    <label>Descrição do Gasto:</label>
                    <input type="text" id="gasto-desc" placeholder="Ex: Mercado, Aluguel...">
                </div>
                <div class="form-group">
                    <label>Valor (R$):</label>
                    <input type="number" id="gasto-valor" placeholder="Ex: 150">
                </div>
                <button onclick="adicionarGasto()">Adicionar Gasto</button>
            </div>

            <h3>Gastos do Mês</h3>
            <ul id="lista-gastos" class="lista-gastos">
                </ul>
        </section>

        <section id="pag-resumo" class="pagina">
            <h2>Resumo de Fim de Mês</h2>
            <div class="card resumo-final">
                <p><strong>Renda Total:</strong> <span id="resumo-renda">R$ 0,00</span></p>
                <p><strong>Total de Gastos:</strong> <span id="resumo-gastos">R$ 0,00</span></p>
                <p><strong>Status Financeiro:</strong> <span id="resumo-status">--</span></p>
                <hr>
                <p class="saldo-final"><strong>Saldo Livre:</strong> <span id="resumo-saldo">R$ 0,00</span></p>
            </div>

            <h2>Dicas de Economia Personalizadas</h2>
            <div id="container-dicas" class="card dicas">
                </div>
            <button class="btn-limpar" onclick="limparDados()">Resetar Mês / Limpar Tudo</button>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
